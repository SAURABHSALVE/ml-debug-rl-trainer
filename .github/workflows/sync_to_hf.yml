name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sync-bot@example.com"
          git config --global user.name "HF Sync Bot"

          # Use 'user:token' format — HF requires your username before the token
          git remote add hf_space https://12-vinit:${HF_TOKEN}@huggingface.co/spaces/12-vinit/ml-experiment-debugger || \
          git remote set-url hf_space https://12-vinit:${HF_TOKEN}@huggingface.co/spaces/12-vinit/ml-experiment-debugger

          git push --force hf_space main
