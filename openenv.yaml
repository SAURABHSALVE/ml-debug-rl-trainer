name: ml-experiment-debugger
version: "4.1.0"
description: >
  A real-world RL environment where agents debug broken ML training runs by
  gathering targeted evidence and then submitting a diagnosis and fix.
  Tasks progress from overfitting to learning-rate instability to silent
  data poisoning.
author: AIverse
difficulty_levels: [easy, medium, hard]

action_space:
  type: structured
  description: >
    Each action is either an investigation tool call or a terminal diagnose
    action that ends the current task and receives a graded score.
  tools:
    - name: fetch_logs
      params: [epochs]
    - name: fetch_config
      params: [keys]
    - name: fetch_loss_curve
      params: [split]
    - name: fetch_diagnostics
      params: [check]
    - name: fetch_class_data
      params: [class_id]
    - name: diagnose
      params: [diagnosis, fix_type, fix_detail, confidence]
      terminal: true

observation_space:
  type: structured
  fields:
    - task_id
    - difficulty
    - description
    - step_number
    - max_steps
    - steps_remaining
    - action_result
    - action_history
    - available_actions
    - hint
    - training_logs
    - config_yaml
    - loss_curve
    - gpu_metrics

reward:
  investigation_signal: -0.01 to +0.03
  diagnose_score: 0.0 to 1.0
  efficiency_bonus: 0.0 to 0.05
  trajectory_bonus: +0.05 on hard task if easy>0.7 and medium>0.6
  notes:
    - Investigation actions earn small positive rewards when they expose evidence relevant to the hidden bug.
    - Redundant identical tool calls receive a -0.01 penalty.
    - Diagnose actions receive deterministic partial credit from task-specific graders.

tasks:
  - id: overfitting
    difficulty: easy
    score_range: [0.0, 1.0]
    max_steps: 15
  - id: lr_explosion
    difficulty: medium
    score_range: [0.0, 1.0]
    max_steps: 15
  - id: data_poisoning
    difficulty: hard
    score_range: [0.0, 1.0]
    max_steps: 15

api:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  health: GET /health

tags: [ml-engineering, debugging, reinforcement-learning, tool-use, openenv]
