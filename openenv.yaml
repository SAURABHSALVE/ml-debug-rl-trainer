name: ml-experiment-debugger
version: "1.1.0"
description: >
  An RL environment where AI agents diagnose broken ML training runs
  through multi-step investigation. The agent receives a task description
  and must CHOOSE which tools to call (fetch_logs, fetch_config,
  fetch_loss_curve, fetch_class_metrics) to gather evidence — each call
  costs one step from a limited budget. When ready, agent calls diagnose
  to submit the root cause and fix. Wrong investigation choices waste
  budget and lower efficiency score.

  5 tasks across 3 difficulty levels (3 randomly sampled per episode):
  - overfitting_detection (easy)
  - lr_explosion (medium)
  - class_imbalance (medium)
  - silent_data_poisoning (hard)
  - catastrophic_forgetting (hard)

  Grading: keyword-based (always) + optional LLM grader (USE_LLM_GRADING=true)
  with 60/40 blending for reproducibility + reasoning quality.

author: AIverse
difficulty_levels: [easy, medium, hard]

action_space:
  type: structured
  description: >
    Each step is either an investigation tool call or a terminal diagnose action.
  tools:
    - name: fetch_logs
      description: Fetch training log lines for a given epoch range
      params: [start_epoch, end_epoch]
    - name: fetch_config
      description: Fetch specific keys from the training config YAML
      params: [keys]
    - name: fetch_loss_curve
      description: Fetch train or val loss curve data
      params: [split]
    - name: fetch_gpu_metrics
      description: Fetch GPU memory and utilization over time
      params: []
    - name: fetch_class_metrics
      description: Fetch per-class accuracy breakdown for a specific class
      params: [class_id]
    - name: diagnose
      description: Submit final root cause diagnosis and fix (terminal action per task)
      params: [diagnosis, fix_type, fix_detail, confidence]
      terminal: true

observation_space:
  type: structured
  fields:
    - task_id
    - difficulty
    - description
    - step_number
    - max_steps
    - steps_remaining
    - tool_result
    - action_history
    - available_tools

reward:
  tool_call_relevant: 0.02
  tool_call_redundant: -0.01
  diagnose_score_range: [0.0, 1.0]
  efficiency_bonus: 0.05
  trajectory_bonus: 0.05
  grading_modes:
    keyword: always_active
    llm_blended: optional_USE_LLM_GRADING_env_var
    blend_ratio: "60% LLM + 40% keyword"

tasks:
  - id: overfitting_detection
    difficulty: easy
    score_range: [0.0, 1.0]
    max_steps: 5
    pool_slot: easy

  - id: lr_explosion
    difficulty: medium
    score_range: [0.0, 1.0]
    max_steps: 6
    pool_slot: medium

  - id: class_imbalance
    difficulty: medium
    score_range: [0.0, 1.0]
    max_steps: 6
    pool_slot: medium

  - id: silent_data_poisoning
    difficulty: hard
    score_range: [0.0, 1.0]
    max_steps: 8
    pool_slot: hard

  - id: catastrophic_forgetting
    difficulty: hard
    score_range: [0.0, 1.0]
    max_steps: 8
    pool_slot: hard

episode:
  tasks_per_episode: 3
  selection: "1 from each difficulty pool (random, seeded)"

tags: [ml-engineering, debugging, real-world, multi-step, tool-use, huggingface, llm-grading, class-imbalance, catastrophic-forgetting]